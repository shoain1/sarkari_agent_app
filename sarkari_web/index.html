<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sarkari Agent | Premium Scheme Finder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #050505; color: #fff; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gradient-text { background: linear-gradient(135deg, #ff9933, #ffffff, #138808); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn-gradient { background: linear-gradient(90deg, #ff9933, #ff6d00); transition: 0.3s; }
        .btn-gradient:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(255, 109, 0, 0.3); }
        .card { transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .card:hover { transform: translateY(-8px) scale(1.02); background: rgba(255, 255, 255, 0.06); }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-20px); } 100% { transform: translateY(0px); } }
        .blob { position: absolute; filter: blur(80px); z-index: -1; animation: float 6s infinite ease-in-out; }
    </style>
</head>
<body class="p-4 md:p-10">

    <!-- Background Orbs -->
    <div class="blob w-64 h-64 bg-orange-600/20 top-10 left-10"></div>
    <div class="blob w-96 h-96 bg-green-600/10 bottom-10 right-10" style="animation-delay: 2s;"></div>

    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="flex justify-between items-center mb-16">
            <div class="text-2xl font-bold tracking-tighter">SARKARI<span class="text-orange-500">PRO</span></div>
            <div class="hidden md:flex gap-8 text-sm text-gray-400 uppercase tracking-widest font-semibold">
                <a href="#" class="hover:text-white transition">Search</a>
                <a href="#" class="hover:text-white transition">Schemes</a>
                <a href="#" class="hover:text-white transition">About</a>
            </div>
        </header>

        <main class="grid md:grid-cols-12 gap-12">
            <!-- Left: Hero & Form -->
            <div class="md:col-span-5">
                <h1 class="text-5xl md:text-7xl font-bold mb-6 leading-none">Find your <span class="gradient-text">Benefits</span>.</h1>
                <p class="text-gray-400 mb-10 text-lg">Our AI agent scans 100+ Indian government portals to find subsidies, grants, and schemes you are eligible for.</p>
                
                <div class="glass p-8 rounded-3xl space-y-6">
                    <div>
                        <label class="block text-xs uppercase tracking-widest text-gray-500 mb-2 font-bold">Age</label>
                        <input type="number" id="age" value="25" class="w-full bg-black/40 border border-white/10 rounded-xl p-4 focus:border-orange-500 outline-none transition">
                    </div>
                    <div>
                        <label class="block text-xs uppercase tracking-widest text-gray-500 mb-2 font-bold">Occupation</label>
                        <select id="occupation" class="w-full bg-black/40 border border-white/10 rounded-xl p-4 focus:border-orange-500 outline-none transition">
                            <option>Farmer</option>
                            <option>Student</option>
                            <option>Salaried</option>
                            <option>Self-Employed</option>
                            <option>Unemployed</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs uppercase tracking-widest text-gray-500 mb-2 font-bold">Annual Income (₹)</label>
                        <input type="number" id="income" value="300000" class="w-full bg-black/40 border border-white/10 rounded-xl p-4 focus:border-orange-500 outline-none transition">
                    </div>
                    <button onclick="findSchemes()" class="w-full btn-gradient p-4 rounded-xl font-bold text-lg">Scan Databases</button>
                </div>
            </div>

            <!-- Right: Results -->
            <div class="md:col-span-7">
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-xl font-semibold uppercase tracking-widest text-gray-400">Agent Results</h2>
                    <div id="status" class="text-xs text-orange-500 font-bold uppercase animate-pulse">Waiting for input...</div>
                </div>
                
                <div id="results" class="space-y-4 max-h-[600px] overflow-y-auto pr-2">
                    <!-- Placeholder -->
                    <div class="glass p-10 rounded-3xl text-center text-gray-500 border-dashed">
                        Enter your profile details to start the search.
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const SCHEMES = [
            { name: "PM-Kisan Samman Nidhi", criteria: { occupation: "Farmer", income_max: 200000 }, benefit: "₹6,000 yearly direct benefit.", link: "https://pmkisan.gov.in/" },
            { name: "Sukanya Samriddhi", criteria: { gender: "Female", age_max: 10 }, benefit: "Premier savings for girl children.", link: "https://www.indiapost.gov.in/" },
            { name: "PM Awas Yojana", criteria: { income_max: 600000 }, benefit: "Housing subsidies for your first home.", link: "https://pmaymis.gov.in/" },
            { name: "PM Mudra Yojana", criteria: { occupation: "Self-Employed", income_max: 1000000 }, benefit: "Business loans up to ₹10 Lakh.", link: "https://www.mudra.org.in/" },
            { name: "Atal Pension Yojana", criteria: { age_min: 18, age_max: 40 }, benefit: "Guaranteed old-age pension.", link: "https://www.npscra.nsdl.co.in/" }
        ];

        async function findSchemes() {
            const age = parseInt(document.getElementById('age').value);
            const occupation = document.getElementById('occupation').value;
            const income = parseInt(document.getElementById('income').value);
            const resultsDiv = document.getElementById('results');
            const statusDiv = document.getElementById('status');

            resultsDiv.innerHTML = '<div class="glass p-10 rounded-3xl text-center text-gray-500">Searching central databases...</div>';
            statusDiv.innerText = "Researching...";

            await new Promise(r => setTimeout(r, 1500));

            const matches = SCHEMES.filter(s => {
                const c = s.criteria;
                if (c.age_max && age > c.age_max) return false;
                if (c.age_min && age < c.age_min) return false;
                if (c.income_max && income > c.income_max) return false;
                if (c.occupation && occupation !== c.occupation) return false;
                return true;
            });

            resultsDiv.innerHTML = '';
            statusDiv.innerText = "Search Complete";

            if (matches.length > 0) {
                matches.forEach(m => {
                    resultsDiv.innerHTML += `
                        <div class="card glass p-6 rounded-3xl flex justify-between items-center">
                            <div>
                                <h3 class="text-xl font-bold mb-2">${m.name}</h3>
                                <p class="text-gray-400 text-sm">${m.benefit}</p>
                            </div>
                            <a href="${m.link}" target="_blank" class="bg-white text-black px-6 py-2 rounded-full font-bold text-sm hover:bg-orange-500 hover:text-white transition">Apply</a>
                        </div>
                    `;
                });
            } else {
                resultsDiv.innerHTML = '<div class="glass p-10 rounded-3xl text-center text-gray-500">No direct matches found for your profile.</div>';
            }
        }
    </script>
</body>
</html>
